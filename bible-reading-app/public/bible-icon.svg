<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy to purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>

    <!-- Golden glow for book pages -->
    <radialGradient id="glowGrad" cx="50%" cy="48%" r="50%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:0.9"/>
      <stop offset="35%" style="stop-color:#ffd54f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:0"/>
    </radialGradient>

    <!-- Left page gradient -->
    <linearGradient id="leftPageGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>

    <!-- Right page gradient -->
    <linearGradient id="rightPageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>

    <!-- Cover gradient -->
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </linearGradient>

    <!-- Spine gradient -->
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Light ray filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner glow filter -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded icon background -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Subtle star / sparkle particles in background -->
  <g opacity="0.3">
    <circle cx="60" cy="70" r="2" fill="#ffffff"/>
    <circle cx="450" cy="90" r="1.5" fill="#ffffff"/>
    <circle cx="80" cy="430" r="1.5" fill="#ffffff"/>
    <circle cx="460" cy="400" r="2" fill="#ffffff"/>
    <circle cx="150" cy="48" r="1" fill="#fbbf24"/>
    <circle cx="380" cy="55" r="1" fill="#fbbf24"/>
    <circle cx="35" cy="260" r="1.5" fill="#ffffff"/>
    <circle cx="490" cy="280" r="1" fill="#ffffff"/>
  </g>

  <!-- Radial light glow behind book -->
  <ellipse cx="256" cy="270" rx="160" ry="120" fill="url(#glowGrad)" filter="url(#glow)"/>

  <!-- ===== THE OPEN BIBLE ===== -->
  <g filter="url(#softShadow)">

    <!-- Book cover base (slightly larger than pages for depth) -->
    <rect x="105" y="175" width="302" height="220" rx="8" fill="url(#coverGrad)"/>

    <!-- Left cover flap -->
    <path d="M105,180 L105,390 Q105,395 112,395 L247,395 L247,175 L112,175 Q105,175 105,180 Z" fill="url(#coverGrad)"/>

    <!-- Right cover flap -->
    <path d="M265,175 L265,395 L400,395 Q407,395 407,388 L407,182 Q407,175 400,175 Z" fill="url(#coverGrad)"/>

    <!-- Spine (center divider) -->
    <rect x="247" y="175" width="18" height="220" rx="0" fill="url(#spineGrad)"/>

    <!-- Left page spread -->
    <path d="M113,182 L245,182 L245,388 L113,388 Q108,388 108,383 L108,187 Q108,182 113,182 Z" fill="url(#leftPageGrad)"/>

    <!-- Right page spread -->
    <path d="M267,182 L399,182 Q404,182 404,187 L404,383 Q404,388 399,388 L267,388 Z" fill="url(#rightPageGrad)"/>

    <!-- Page lines on left page -->
    <g opacity="0.25" stroke="#92400e" stroke-width="1.5" fill="none">
      <line x1="125" y1="210" x2="235" y2="210"/>
      <line x1="125" y1="225" x2="235" y2="225"/>
      <line x1="125" y1="240" x2="235" y2="240"/>
      <line x1="125" y1="255" x2="235" y2="255"/>
      <line x1="125" y1="270" x2="235" y2="270"/>
      <line x1="125" y1="285" x2="235" y2="285"/>
      <line x1="125" y1="300" x2="235" y2="300"/>
      <line x1="125" y1="315" x2="235" y2="315"/>
      <line x1="125" y1="330" x2="235" y2="330"/>
      <line x1="125" y1="345" x2="235" y2="345"/>
      <line x1="125" y1="360" x2="235" y2="360"/>
    </g>

    <!-- Page lines on right page -->
    <g opacity="0.25" stroke="#92400e" stroke-width="1.5" fill="none">
      <line x1="277" y1="210" x2="388" y2="210"/>
      <line x1="277" y1="225" x2="388" y2="225"/>
      <line x1="277" y1="240" x2="388" y2="240"/>
      <line x1="277" y1="255" x2="388" y2="255"/>
      <line x1="277" y1="270" x2="388" y2="270"/>
      <line x1="277" y1="285" x2="388" y2="285"/>
      <line x1="277" y1="300" x2="388" y2="300"/>
      <line x1="277" y1="315" x2="388" y2="315"/>
      <line x1="277" y1="330" x2="388" y2="330"/>
      <line x1="277" y1="345" x2="388" y2="345"/>
      <line x1="277" y1="360" x2="388" y2="360"/>
    </g>

    <!-- Golden cross on the spine / center -->
    <g filter="url(#glow)">
      <!-- Vertical bar of cross -->
      <rect x="253" y="205" width="6" height="50" rx="1" fill="url(#goldGrad)"/>
      <!-- Horizontal bar of cross -->
      <rect x="240" y="220" width="32" height="6" rx="1" fill="url(#goldGrad)"/>
    </g>

    <!-- Gold trim line on spine top -->
    <rect x="248" y="175" width="16" height="3" rx="1" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Gold trim line on spine bottom -->
    <rect x="248" y="390" width="16" height="3" rx="1" fill="url(#goldGrad)" opacity="0.8"/>

    <!-- Gold decorative corner bookmark left page -->
    <path d="M113,182 L130,182 L113,202 Z" fill="url(#goldGrad)" opacity="0.5"/>
    <!-- Gold decorative corner bookmark right page -->
    <path d="M399,182 L382,182 L399,202 Z" fill="url(#goldGrad)" opacity="0.5"/>

  </g>

  <!-- Light rays emanating upward from book center (subtle) -->
  <g opacity="0.15" filter="url(#glow)">
    <line x1="256" y1="175" x2="200" y2="80" stroke="#fde68a" stroke-width="3"/>
    <line x1="256" y1="175" x2="256" y2="70" stroke="#fde68a" stroke-width="4"/>
    <line x1="256" y1="175" x2="312" y2="80" stroke="#fde68a" stroke-width="3"/>
    <line x1="256" y1="175" x2="155" y2="95" stroke="#fde68a" stroke-width="2"/>
    <line x1="256" y1="175" x2="357" y2="95" stroke="#fde68a" stroke-width="2"/>
  </g>

  <!-- Gold glow dot at top of spine -->
  <circle cx="256" cy="175" r="5" fill="#fbbf24" opacity="0.9" filter="url(#glow)"/>

  <!-- ===== DOVE silhouette above the book ===== -->
  <g transform="translate(218, 90) scale(0.75)" fill="#ffffff" opacity="0.85" filter="url(#glow)">
    <!-- Simple dove shape made from paths -->
    <path d="M50,40 C35,20 5,15 0,30 C10,28 25,35 30,45 C20,42 8,48 5,58 C15,52 30,52 38,58 C40,65 38,75 35,80 C42,72 50,60 48,50 C55,55 65,58 72,55 C65,48 55,45 50,40 Z" fill="#e0e7ff"/>
    <path d="M50,40 C60,25 80,22 85,35 C75,32 62,38 58,48 C70,43 82,47 88,56 C78,51 65,52 58,58 C57,65 59,75 62,80 C55,72 48,60 50,50 C43,55 33,58 26,55 C33,48 43,45 50,40 Z" fill="#c7d2fe" opacity="0.7"/>
    <!-- Dove body -->
    <ellipse cx="50" cy="52" rx="12" ry="8" fill="#e0e7ff"/>
    <!-- Dove eye -->
    <circle cx="46" cy="48" r="2" fill="#4c1d95"/>
    <circle cx="45.5" cy="47.5" r="0.8" fill="#ffffff"/>
    <!-- Dove beak -->
    <path d="M42,49 L38,51 L42,53 Z" fill="#fbbf24"/>
  </g>

  <!-- Rounded border / frame glow -->
  <rect x="4" y="4" width="504" height="504" rx="97" ry="97" fill="none"
        stroke="url(#goldGrad)" stroke-width="3" opacity="0.4"/>

</svg>
